apiVersion: v1
kind: Service
metadata:
  name: risk-engine-bg-active
spec:
  selector:
    app: risk-engine-bg
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine-bg-preview
spec:
  selector:
    app: risk-engine-bg
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: risk-engine-bg
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-engine-bg
  template:
    metadata:
      labels:
        app: risk-engine-bg
    spec:
      containers:
        - name: risk-engine
          image: ghcr.io/riskplatform/risk-engine:v1
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
  strategy:
    blueGreen:
      activeService: risk-engine-bg-active
      previewService: risk-engine-bg-preview
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 10
