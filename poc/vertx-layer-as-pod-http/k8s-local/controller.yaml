apiVersion: v1
kind: ServiceAccount
metadata:
  name: risk-controller-sa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-controller
spec:
  replicas: 2
  selector:
    matchLabels: { app: risk-controller }
  template:
    metadata:
      labels: { app: risk-controller, boundary: controller }
    spec:
      serviceAccountName: risk-controller-sa
      containers:
        - name: controller
          image: local/vertx-layer-as-pod-http:dev
          args: ["controller"]
          ports: [{ containerPort: 8080 }]
          env:
            - name: ALLOWED_SCOPE
              value: risk:evaluate
