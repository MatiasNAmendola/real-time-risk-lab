services:
  vertx-monolith-inprocess:
    build:
      context: ${REPO_ROOT}/poc/vertx-monolith-inprocess
      dockerfile: Dockerfile
    image: riskplatform/vertx-monolith-inprocess:latest
    user: "1005:1005"
    environment:
      OTEL_SERVICE_NAME:               vertx-monolith-inprocess
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      PG_HOST:                         postgres
      PG_PORT:                         "5432"
      PG_DATABASE:                     riskplatform
      PG_USER:                         riskplatform
      PG_PASSWORD:                     riskplatform
      VALKEY_URL:                      redis://valkey:6379
      KAFKA_BOOTSTRAP_SERVERS:         tansu:9092
      # AWS mocks via Floci unified emulator (ADR-0042). Single endpoint :4566.
      FLOCI_ENDPOINT:                  http://floci:4566
      AWS_ENDPOINT_URL:                http://floci:4566
      AWS_ACCESS_KEY_ID:               test
      AWS_SECRET_ACCESS_KEY:           test
      AWS_REGION:                      us-east-1
      RISK_AUDIT_BUCKET:               risk-audit
      RISK_SQS_QUEUE:                  risk-decisions-queue
      RULES_CONFIG_PATH:               /etc/riskplatform/rules/rules.yaml
      ADMIN_TOKEN:                     ${ADMIN_TOKEN:-change-me-admin-token}
      BARRIER_MODE:                    blocking
      JAVA_TOOL_OPTIONS:               "-Xms128m -Xmx768m"
    volumes:
      - ${REPO_ROOT}/examples/rules-config/v1/rules.yaml:/etc/riskplatform/rules/rules.yaml:ro
    ports:
      - "8090:8090"
    networks:
      - app-net
      - data-net
      - telemetry-net
    depends_on:
      postgres: { condition: service_healthy }
      tansu: { condition: service_started }
      tansu-init: { condition: service_completed_successfully }
      floci: { condition: service_healthy }
      floci-init: { condition: service_completed_successfully }
      otel-collector: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    mem_limit: 1024m
    mem_reservation: 512m
