##############################################################################
# vertx-layer-as-pod-eventbus — app-layer override for the shared infra stack.
#
# Brings up the 4 Java services. Always compose with the base infra file:
#
#   REPO_ROOT="$(pwd)" docker compose \
#     -f compose/docker-compose.yml \
#     -f poc/vertx-layer-as-pod-eventbus/compose.override.yml \
#     up -d
#
# REPO_ROOT must be set so volume mounts for rules-config resolve correctly.
# Set it to the repo root (directory containing the nx script).
#
# UIDs: controller=1001, usecase=1002, repository=1003, consumer=1004.
##############################################################################

services:

  # ============================================================================
  # Shared async infra network attachment for this PoC
  #   Base compose keeps Redpanda/MinIO/ElasticMQ on data-net for init jobs.
  #   This override also attaches them to async-net so usecase-app and
  #   consumer-app can publish/consume async outputs without joining data-net
  #   and without being able to reach Postgres/Moto/OpenBao.
  # ============================================================================
  redpanda:
    networks:
      - data-net
      - async-net

  minio:
    networks:
      - data-net
      - async-net

  elasticmq:
    networks:
      - data-net
      - async-net

  # ============================================================================
  # App — repository-app (data access layer)
  #   Layered first because controller and usecase depend on it for healthchecks.
  # ============================================================================
  repository-app:
    build:
      context: ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus
      dockerfile: repository-app/Dockerfile
    image: riskplatform/repository-app:latest
    user: "1003:1003"
    environment:
      PG_HOST:     postgres
      PG_PORT:     "5432"
      PG_DATABASE: riskplatform
      PG_USER:     riskplatform
      PG_PASSWORD: riskplatform
      OTEL_SERVICE_NAME:               repository-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      # Keep telemetry from becoming the hidden saturator during local bring-up.
      # Requests still emit trace/log/metric; exporter calls fail fast if OpenObserve
      # is overloaded instead of holding OkHttp/worker threads for 10s.
      OTEL_EXPORTER_OTLP_TIMEOUT:      "2000"
      OTEL_BSP_EXPORT_TIMEOUT:         "2000"
      OTEL_BLRP_EXPORT_TIMEOUT:        "2000"
      OTEL_METRIC_EXPORT_INTERVAL:     "60000"
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      OTEL_INSTRUMENTATION_VERTX_ENABLED: "true"
      AWS_ENDPOINT_URL_SECRETSMANAGER: http://moto:5000
      AWS_ACCESS_KEY_ID:               ${AWS_MOCK_ACCESS_KEY_ID:-change-me-aws-mock-access-key}
      AWS_SECRET_ACCESS_KEY:           ${AWS_MOCK_SECRET_ACCESS_KEY:-change-me-aws-mock-secret-key}
      AWS_REGION:                      us-east-1
      DB_SECRET_NAME:                  riskplatform/db-password
      OPENBAO_URL:                     http://openbao:8200
      OPENBAO_TOKEN:                   ${OPENBAO_DEV_ROOT_TOKEN:-change-me-openbao-root-token}
      EVENT_BUS_HOST:                  repository-app
      HAZELCAST_CONFIG_PATH:            /etc/riskplatform/hazelcast/hazelcast.xml
      # JVM tuned to fit inside mem_limit=512m. Hazelcast network/thread/heartbeat
      # settings live in the mounted XML below, not in per-service JVM flags.
      JAVA_TOOL_OPTIONS:               "-Xms96m -Xmx256m -XX:ActiveProcessorCount=2 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=64m -Dvertx.options.blockedThreadCheckInterval=10000 -Dvertx.options.maxEventLoopExecuteTime=10000000000"
    volumes:
      - ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus/hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    ports:
      - "6303:6300"
    networks:
      - app-net
      - data-net
      - telemetry-net
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      moto-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f repository-app >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.75"

  # ============================================================================
  # App — usecase-app (business logic + async publisher/audit adapters)
  #   Joins app-net for clustered EventBus and async-net for Kafka/S3/SQS.
  #   It intentionally does NOT join data-net, so it cannot reach Postgres,
  #   Moto Secrets Manager, or OpenBao directly; repository-app owns DB/secrets.
  # ============================================================================
  usecase-app:
    build:
      context: ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus
      dockerfile: usecase-app/Dockerfile
    image: riskplatform/usecase-app:latest
    user: "1002:1002"
    environment:
      OTEL_SERVICE_NAME:               usecase-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      # Keep telemetry from becoming the hidden saturator during local bring-up.
      # Requests still emit trace/log/metric; exporter calls fail fast if OpenObserve
      # is overloaded instead of holding OkHttp/worker threads for 10s.
      OTEL_EXPORTER_OTLP_TIMEOUT:      "2000"
      OTEL_BSP_EXPORT_TIMEOUT:         "2000"
      OTEL_BLRP_EXPORT_TIMEOUT:        "2000"
      OTEL_METRIC_EXPORT_INTERVAL:     "60000"
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      OTEL_INSTRUMENTATION_VERTX_ENABLED: "true"
      EVENT_BUS_HOST:                  usecase-app
      HAZELCAST_CONFIG_PATH:            /etc/riskplatform/hazelcast/hazelcast.xml
      KAFKA_BOOTSTRAP_SERVERS:         redpanda:9092
      AWS_ENDPOINT_URL_S3:             http://minio:9000
      AWS_ENDPOINT_URL_SQS:            http://elasticmq:9324
      AWS_ACCESS_KEY_ID:               ${AWS_MOCK_ACCESS_KEY_ID:-change-me-aws-mock-access-key}
      AWS_SECRET_ACCESS_KEY:           ${AWS_MOCK_SECRET_ACCESS_KEY:-change-me-aws-mock-secret-key}
      S3_ACCESS_KEY_ID:                ${MINIO_ROOT_USER:-change-me-minio-user}
      S3_SECRET_ACCESS_KEY:            ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
      AWS_REGION:                      us-east-1
      RISK_AUDIT_BUCKET:               risk-audit
      RISK_SQS_QUEUE:                  risk-decisions-queue
      RULES_CONFIG_PATH:               /etc/riskplatform/rules/rules.yaml
      BARRIER_MODE:                    blocking
      # usecase-app carries AWS SDK + Hazelcast + ML scoring on init: bumped to
      # 1G to stop BlockedThreadChecker firing on cold start. Heap=640m leaves
      # 384m for metaspace/direct/native (AWS SDK is metaspace-heavy).
      JAVA_TOOL_OPTIONS:               "-Xms96m -Xmx384m -XX:ActiveProcessorCount=2 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:MaxMetaspaceSize=192m -XX:MaxDirectMemorySize=96m -Dvertx.options.blockedThreadCheckInterval=10000 -Dvertx.options.maxEventLoopExecuteTime=10000000000"
    volumes:
      - ${REPO_ROOT:-.}/examples/rules-config/v1/rules.yaml:/etc/riskplatform/rules/rules.yaml:ro
      - ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus/hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    ports:
      - "6302:6300"
    networks:
      - app-net
      - async-net
      - telemetry-net
    depends_on:
      repository-app:
        condition: service_started
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      elasticmq-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f usecase-app >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    mem_limit: 768m
    mem_reservation: 512m
    cpus: "0.75"

  # ============================================================================
  # App — controller-app (HTTP ingress layer)
  # ============================================================================
  controller-app:
    build:
      context: ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus
      dockerfile: controller-app/Dockerfile
    image: riskplatform/controller-app:latest
    user: "1001:1001"
    environment:
      OTEL_SERVICE_NAME:               controller-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      # Keep telemetry from becoming the hidden saturator during local bring-up.
      # Requests still emit trace/log/metric; exporter calls fail fast if OpenObserve
      # is overloaded instead of holding OkHttp/worker threads for 10s.
      OTEL_EXPORTER_OTLP_TIMEOUT:      "2000"
      OTEL_BSP_EXPORT_TIMEOUT:         "2000"
      OTEL_BLRP_EXPORT_TIMEOUT:        "2000"
      OTEL_METRIC_EXPORT_INTERVAL:     "60000"
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      OTEL_INSTRUMENTATION_VERTX_ENABLED: "true"
      RULES_CONFIG_PATH:               /etc/riskplatform/rules/rules.yaml
      ADMIN_TOKEN:                     ${ADMIN_TOKEN:-change-me-admin-token}
      BARRIER_MODE:                    blocking
      EVENT_BUS_HOST:                  controller-app
      HAZELCAST_CONFIG_PATH:            /etc/riskplatform/hazelcast/hazelcast.xml
      # heap=448m fits inside mem_limit=768m with metaspace+direct+native.
      JAVA_TOOL_OPTIONS:               "-Xms96m -Xmx384m -XX:ActiveProcessorCount=2 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=64m -Dvertx.options.blockedThreadCheckInterval=10000 -Dvertx.options.maxEventLoopExecuteTime=10000000000"
    volumes:
      - ${REPO_ROOT:-.}/examples/rules-config/v1/rules.yaml:/etc/riskplatform/rules/rules.yaml:ro
      - ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus/hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    ports:
      - "8080:8080"
      - "6301:6300"
    networks:
      - app-net
      - telemetry-net
    depends_on:
      usecase-app:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    mem_limit: 768m
    mem_reservation: 384m
    cpus: "0.75"

  # ============================================================================
  # App — consumer-app (Kafka downstream consumer for audit/analytics)
  #   Kafka-only downstream path: it does not join the Hazelcast/Vert.x cluster.
  # ============================================================================
  consumer-app:
    build:
      context: ${REPO_ROOT:-.}/poc/vertx-layer-as-pod-eventbus
      dockerfile: consumer-app/Dockerfile
    image: riskplatform/consumer-app:latest
    user: "1004:1004"
    environment:
      OTEL_SERVICE_NAME:               consumer-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      # Keep telemetry from becoming the hidden saturator during local bring-up.
      # Requests still emit trace/log/metric; exporter calls fail fast if OpenObserve
      # is overloaded instead of holding OkHttp/worker threads for 10s.
      OTEL_EXPORTER_OTLP_TIMEOUT:      "2000"
      OTEL_BSP_EXPORT_TIMEOUT:         "2000"
      OTEL_BLRP_EXPORT_TIMEOUT:        "2000"
      OTEL_METRIC_EXPORT_INTERVAL:     "60000"
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      KAFKA_BOOTSTRAP_SERVERS:         redpanda:9092
      AWS_ENDPOINT_URL_S3:             http://minio:9000
      AWS_ACCESS_KEY_ID:               ${AWS_MOCK_ACCESS_KEY_ID:-change-me-aws-mock-access-key}
      AWS_SECRET_ACCESS_KEY:           ${AWS_MOCK_SECRET_ACCESS_KEY:-change-me-aws-mock-secret-key}
      S3_ACCESS_KEY_ID:                ${MINIO_ROOT_USER:-change-me-minio-user}
      S3_SECRET_ACCESS_KEY:            ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
      AWS_REGION:                      us-east-1
      RISK_AUDIT_BUCKET:               risk-audit
      # consumer-app does not join Hazelcast cluster (Kafka-only); no EB host.
      JAVA_TOOL_OPTIONS:               "-Xms64m -Xmx192m -XX:ActiveProcessorCount=1 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:MaxMetaspaceSize=96m -XX:MaxDirectMemorySize=48m -Dvertx.options.blockedThreadCheckInterval=10000 -Dvertx.options.maxEventLoopExecuteTime=10000000000"
    ports:
      - "6304:6300"
    networks:
      - async-net
      - telemetry-net
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      elasticmq-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    mem_limit: 384m
    mem_reservation: 192m
    cpus: "0.50"

networks:
  app-net: {}
  async-net: {}
  data-net: {}
  telemetry-net: {}
