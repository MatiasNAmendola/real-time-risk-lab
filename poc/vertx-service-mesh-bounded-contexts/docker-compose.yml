services:
  fraud-rules-service:
    build:
      context: .
      dockerfile: fraud-rules-service/Dockerfile
    image: riskplatform/service-mesh-fraud-rules:0.1.0
    environment:
      EVENT_BUS_HOST: fraud-rules-service
      HAZELCAST_CONFIG_PATH: /etc/riskplatform/hazelcast/hazelcast.xml
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:ActiveProcessorCount=1 -XX:+UseG1GC"
    volumes:
      - ./hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    networks: [mesh-net]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f fraud-rules-service >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 20s
    mem_limit: 384m
    cpus: "0.50"

  ml-scorer-service:
    build:
      context: .
      dockerfile: ml-scorer-service/Dockerfile
    image: riskplatform/service-mesh-ml-scorer:0.1.0
    environment:
      EVENT_BUS_HOST: ml-scorer-service
      HAZELCAST_CONFIG_PATH: /etc/riskplatform/hazelcast/hazelcast.xml
      ML_DELAY_MS: "12"
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:ActiveProcessorCount=1 -XX:+UseG1GC"
    volumes:
      - ./hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    networks: [mesh-net]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ml-scorer-service >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 20s
    mem_limit: 384m
    cpus: "0.50"

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    image: riskplatform/service-mesh-audit:0.1.0
    environment:
      EVENT_BUS_HOST: audit-service
      HAZELCAST_CONFIG_PATH: /etc/riskplatform/hazelcast/hazelcast.xml
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:ActiveProcessorCount=1 -XX:+UseG1GC"
    volumes:
      - ./hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    networks: [mesh-net]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f audit-service >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 20s
    mem_limit: 384m
    cpus: "0.50"

  risk-decision-service:
    build:
      context: .
      dockerfile: risk-decision-service/Dockerfile
    image: riskplatform/service-mesh-risk-decision:0.1.0
    environment:
      EVENT_BUS_HOST: risk-decision-service
      HAZELCAST_CONFIG_PATH: /etc/riskplatform/hazelcast/hazelcast.xml
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:ActiveProcessorCount=2 -XX:+UseG1GC"
    volumes:
      - ./hazelcast/hazelcast.xml:/etc/riskplatform/hazelcast/hazelcast.xml:ro
    ports:
      - "8090:8090"
    networks: [mesh-net]
    depends_on:
      fraud-rules-service:
        condition: service_healthy
      ml-scorer-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    mem_limit: 512m
    cpus: "0.75"

networks:
  mesh-net:
    name: vertx-service-mesh-bounded-contexts-net
