##############################################################################
# poc/kafka-s3-tansu — compose override
#
# STATUS (2026-05-11): Tansu is now defined in compose/docker-compose.yml as
# the primary Kafka-compatible broker for the entire repo (see ADR-0043). The
# `tansu` and `tansu-init` services + the `tansu` S3 bucket are seeded by the
# shared infra stack. This override is now a no-op kept for backwards
# compatibility with `./scripts/up.sh` in this PoC directory.
#
# To bring up Tansu + Floci as a minimal pair (the original PoC scenario), use
# the base file alone — no override needed:
#
#   docker compose -f compose/docker-compose.yml up -d tansu tansu-init floci floci-init
##############################################################################

services: {}
