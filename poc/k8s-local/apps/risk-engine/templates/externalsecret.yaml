apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "risk-engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "risk-engine.labels" . | nindent 4 }}
  annotations:
    # Mega prod: this points to AWS Secrets Manager secret ARN via IRSA ServiceAccount
    # Local: reads from ClusterSecretStore "local-k8s-store" (Kubernetes provider, secrets-source ns)
    local.dev/note: "In prod, secretStoreRef.name = aws-secrets-manager-store"
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: local-k8s-store
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner
    # Secret type Opaque — mounted via envFrom in the Rollout
    template:
      type: Opaque
  # Map fields from the source secret in secrets-source namespace
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.secretKey }}
        property: DB_PASSWORD
    - secretKey: API_KEY
      remoteRef:
        key: {{ .Values.externalSecret.secretKey }}
        property: API_KEY
    - secretKey: KAFKA_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.secretKey }}
        property: KAFKA_PASSWORD
