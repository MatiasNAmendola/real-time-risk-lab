# ArgoCD values for local k3d PoC
# Ref: https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd

global:
  domain: argocd.localhost

configs:
  params:
    # Disable TLS inside the cluster (Traefik handles it at ingress)
    server.insecure: true

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.localhost
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

dex:
  enabled: false

redis:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
