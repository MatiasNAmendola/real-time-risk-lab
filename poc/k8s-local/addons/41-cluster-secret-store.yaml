---
# Source secret in secrets-source namespace — simulates AWS Secrets Manager
# In production this would be managed by AWS and referenced by IRSA role.
# Locally: ESO reads from this Kubernetes Secret directly.
apiVersion: v1
kind: Secret
metadata:
  name: risk-engine-secrets
  namespace: secrets-source
type: Opaque
stringData:
  DB_PASSWORD: "${POC_DB_PASSWORD:-change-me-db-password}"
  API_KEY: "${POC_API_KEY:-change-me-api-key}"
  KAFKA_PASSWORD: ""   # Redpanda local has no auth
---
# ServiceAccount used by ESO ClusterSecretStore to read from secrets-source
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-reader
  namespace: external-secrets
---
# ClusterRole: read secrets in secrets-source
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-secrets-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    # Restrict to secrets-source namespace only via RoleBinding, not ClusterRoleBinding
---
# RoleBinding scoped to secrets-source namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secrets-reader
  namespace: secrets-source
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-secrets-reader
subjects:
  - kind: ServiceAccount
    name: eso-reader
    namespace: external-secrets
---
# ClusterSecretStore: Kubernetes provider pointing to secrets-source namespace
# Mega prod equivalent: ClusterSecretStore with provider=aws, service=SecretsManager + IRSA annotation
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: local-k8s-store
spec:
  provider:
    kubernetes:
      # Read secrets from secrets-source namespace
      remoteNamespace: secrets-source
      server:
        # In-cluster: use service account token
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: secrets-source
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-reader
          namespace: external-secrets
