# Redpanda values for local k3d PoC — 1 broker, dev mode, no TLS
# Repo: https://charts.redpanda.com/
# Chart: redpanda/redpanda
# Mega prod: Redpanda in-cluster (multi-broker, TLS, SASL). Local: stripped to minimum.

statefulset:
  replicas: 1

# Dev mode: relaxes resource/disk requirements
config:
  cluster:
    auto_create_topics_enabled: true
    default_topic_replications: 1
    default_topic_partitions: 3

storage:
  persistentVolume:
    enabled: true
    size: 2Gi

# No TLS for local dev
tls:
  enabled: false

# No authentication for local dev
auth:
  sasl:
    enabled: false

resources:
  cpu:
    cores: 1
  memory:
    container:
      max: 512Mi

console:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: redpanda.localhost
        paths:
          - path: /
            pathType: Prefix
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

# Listeners — plaintext only
listeners:
  kafka:
    port: 9092
    tls:
      enabled: false
  admin:
    port: 9644
    tls:
      enabled: false
  schemaRegistry:
    port: 8081
    tls:
      enabled: false
  http:
    port: 8082
    tls:
      enabled: false
