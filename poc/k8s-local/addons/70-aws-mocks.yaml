---
# AWS mocks — Floci unified AWS emulator.
# ADR-0042: replaces the prior MinIO + ElasticMQ + Moto + OpenBao stack.
# Image: floci/floci:latest (GraalVM native, MIT, ~40 MB, ~24 ms startup).
# Single endpoint: http://floci.aws-mocks.svc.cluster.local:4566
# Covers: S3, SQS, SNS, Secrets Manager, KMS, STS, IAM, DynamoDB, and more.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci
  namespace: aws-mocks
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/part-of: aws-mocks
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: floci
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci
        app.kubernetes.io/part-of: aws-mocks
    spec:
      containers:
        - name: floci
          image: floci/floci:latest
          env:
            - name: FLOCI_HOSTNAME
              value: floci.aws-mocks.svc.cluster.local
            - name: FLOCI_BASE_URL
              value: http://floci.aws-mocks.svc.cluster.local:4566
            - name: FLOCI_DEFAULT_REGION
              value: us-east-1
          ports:
            - name: aws
              containerPort: 4566
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /_floci/health
              port: 4566
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_floci/health
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: floci
  namespace: aws-mocks
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/part-of: aws-mocks
spec:
  selector:
    app.kubernetes.io/name: floci
  ports:
    - name: aws
      port: 4566
      targetPort: 4566
