---
# AWS mocks — Floci unified AWS emulator.
# ADR-0042: replaces the prior MinIO + ElasticMQ + Moto + OpenBao stack.
# Image: floci/floci:latest (GraalVM native, MIT, ~40 MB, ~24 ms startup).
# Single endpoint: http://floci.aws-mocks.svc.cluster.local:4566
# Covers: S3, SQS, SNS, Secrets Manager, KMS, STS, IAM, DynamoDB, and more.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci
  namespace: aws-mocks
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/part-of: aws-mocks
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: floci
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci
        app.kubernetes.io/part-of: aws-mocks
    spec:
      # Disable k8s legacy service-link env injection: k8s otherwise sets
      # FLOCI_PORT=tcp://<ip>:4566 which Quarkus parses as `quarkus.http.port`
      # and the boot fails with SRCFG00029 (Expected an integer, got tcp://...).
      enableServiceLinks: false
      containers:
        - name: floci
          image: floci/floci:latest
          env:
            - name: FLOCI_HOSTNAME
              value: floci.aws-mocks.svc.cluster.local
            - name: FLOCI_BASE_URL
              value: http://floci.aws-mocks.svc.cluster.local:4566
            - name: FLOCI_DEFAULT_REGION
              value: us-east-1
            # Explicit Quarkus port — defence in depth against env collision.
            - name: QUARKUS_HTTP_PORT
              value: "4566"
            # Persist S3/SQS/Secrets state across pod restarts to /app/data.
            # Without this Floci runs in memory mode (verified in logs:
            # "Storage mode: memory") and every restart wipes buckets/objects,
            # leaving Tansu's broker referencing orphan S3 metadata.
            - name: FLOCI_STORAGE_MODE
              value: persistent
          ports:
            - name: aws
              containerPort: 4566
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            # 256Mi triggers OOM during S3 init under concurrent load.
            limits:
              cpu: 1000m
              memory: 768Mi
          # Startup probe gives the GraalVM native binary up to ~90s for the
          # cold-init S3 storage scan; afterwards the periodic probes take over.
          startupProbe:
            httpGet:
              path: /_floci/health
              port: 4566
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /_floci/health
              port: 4566
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Liveness must tolerate scheduler pauses (Floci ticks every 10s,
          # plus async S3 writes). timeout=1s + period=15s was killing the
          # pod under any momentary slowness → restart-loop → in-memory wipe.
          livenessProbe:
            httpGet:
              path: /_floci/health
              port: 4566
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          # emptyDir survives container restart within the same pod but NOT
          # pod recreation. For PoC-local dev this is acceptable; production
          # would want a PVC.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: floci
  namespace: aws-mocks
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/part-of: aws-mocks
spec:
  selector:
    app.kubernetes.io/name: floci
  ports:
    - name: aws
      port: 4566
      targetPort: 4566
