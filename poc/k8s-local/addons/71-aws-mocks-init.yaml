---
# floci-init — seeds S3 buckets, SQS queues, SNS topics, Secrets Manager entries
# against the Floci AWS emulator (single endpoint).
# Re-runnable: up.sh deletes and re-creates this Job on each run.
# ADR-0042.
apiVersion: batch/v1
kind: Job
metadata:
  name: floci-init
  namespace: aws-mocks
  labels:
    app.kubernetes.io/name: floci-init
    app.kubernetes.io/part-of: aws-mocks
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci-init
        app.kubernetes.io/part-of: aws-mocks
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: amazon/aws-cli:latest
          env:
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
            - name: FLOCI_ENDPOINT
              value: http://floci.aws-mocks.svc.cluster.local:4566
            - name: POC_DB_PASSWORD
              value: change-me-db-password
            - name: POC_API_KEY
              value: change-me-api-key
          command: ["/bin/sh", "-ec"]
          args:
            - |
              EP="$FLOCI_ENDPOINT"
              echo "=== Seeding Floci at $EP ==="

              # ─── S3 buckets ────────────────────────────────────────────────
              # `tansu` bucket holds the Tansu broker's S3 storage backend
              # (clusters/tansu/meta.json, partitions, watermarks). Added
              # 2026-05-12 — required by poc/k8s-local/addons/50-tansu.yaml.
              for b in risk-events risk-models risk-audit tansu; do
                if aws --endpoint-url=$EP s3api head-bucket --bucket "$b" >/dev/null 2>&1; then
                  echo "  s3 exists:   $b"
                else
                  aws --endpoint-url=$EP s3 mb "s3://$b" >/dev/null
                  echo "  s3 created:  $b"
                fi
              done

              # ─── SQS queues (DLQ first; then main with redrive) ────────────
              aws --endpoint-url=$EP sqs create-queue \
                --queue-name risk-decisions-dlq \
                --attributes VisibilityTimeout=30 >/dev/null 2>&1 || true

              DLQ_ARN=$(aws --endpoint-url=$EP sqs get-queue-attributes \
                --queue-url $EP/000000000000/risk-decisions-dlq \
                --attribute-names QueueArn \
                --query 'Attributes.QueueArn' --output text 2>/dev/null || true)

              if [ -n "$DLQ_ARN" ] && [ "$DLQ_ARN" != "None" ]; then
                aws --endpoint-url=$EP sqs create-queue \
                  --queue-name risk-decisions \
                  --attributes "{\"VisibilityTimeout\":\"30\",\"RedrivePolicy\":\"{\\\"deadLetterTargetArn\\\":\\\"${DLQ_ARN}\\\",\\\"maxReceiveCount\\\":\\\"3\\\"}\"}" \
                  >/dev/null 2>&1 || true
              else
                aws --endpoint-url=$EP sqs create-queue --queue-name risk-decisions >/dev/null 2>&1 || true
              fi
              aws --endpoint-url=$EP sqs create-queue --queue-name risk-decisions-queue >/dev/null 2>&1 || true
              aws --endpoint-url=$EP sqs create-queue --queue-name risk-audit-queue >/dev/null 2>&1 || true
              echo "  sqs ready:   risk-decisions(+dlq), risk-decisions-queue, risk-audit-queue"

              # ─── SNS topic ─────────────────────────────────────────────────
              aws --endpoint-url=$EP sns create-topic --name risk-events >/dev/null 2>&1 || true
              echo "  sns ready:   risk-events"

              # ─── Secrets Manager ───────────────────────────────────────────
              seed_secret() {
                NAME="$1"; VAL="$2"
                if aws --endpoint-url=$EP secretsmanager describe-secret --secret-id "$NAME" >/dev/null 2>&1; then
                  echo "  sec exists:  $NAME"
                else
                  aws --endpoint-url=$EP secretsmanager create-secret \
                    --name "$NAME" --secret-string "$VAL" >/dev/null
                  echo "  sec created: $NAME"
                fi
              }
              seed_secret risk-engine/db-password "$POC_DB_PASSWORD"
              seed_secret risk-engine/api-key     "$POC_API_KEY"
              seed_secret riskplatform/db-password "$POC_DB_PASSWORD"

              echo ""
              echo "=== Floci init complete ==="
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
