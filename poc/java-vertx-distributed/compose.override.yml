##############################################################################
# java-vertx-distributed — app-layer override for the shared infra stack.
#
# Brings up the 4 Java services. Always compose with the base infra file:
#
#   REPO_ROOT="$(pwd)" docker compose \
#     -f compose/docker-compose.yml \
#     -f poc/java-vertx-distributed/compose.override.yml \
#     up -d
#
# REPO_ROOT must be set so volume mounts for rules-config resolve correctly.
# Set it to the repo root (directory containing the nx script).
#
# UIDs: controller=1001, usecase=1002, repository=1003, consumer=1004.
##############################################################################

services:

  # ============================================================================
  # App — repository-app (data access layer)
  #   Layered first because controller and usecase depend on it for healthchecks.
  # ============================================================================
  repository-app:
    build:
      context: ${REPO_ROOT:-.}/poc/java-vertx-distributed
      dockerfile: repository-app/Dockerfile
    image: naranjax/repository-app:latest
    user: "1003:1003"
    environment:
      PG_HOST:     postgres
      PG_PORT:     "5432"
      PG_DATABASE: naranjax
      PG_USER:     naranjax
      PG_PASSWORD: naranjax
      OTEL_SERVICE_NAME:               repository-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      OTEL_INSTRUMENTATION_VERTX_ENABLED: "true"
      HAZELCAST_MEMBERS:               controller-app:5701,usecase-app:5701,repository-app:5701
      AWS_ENDPOINT_URL_SECRETSMANAGER: http://moto:5000
      AWS_ACCESS_KEY_ID:               test
      AWS_SECRET_ACCESS_KEY:           test
      AWS_REGION:                      us-east-1
      DB_SECRET_NAME:                  naranjax/db-password
      OPENBAO_URL:                     http://openbao:8200
      OPENBAO_TOKEN:                   root
      JAVA_TOOL_OPTIONS:               "-Xms128m -Xmx384m"
    ports:
      - "6303:6300"
    networks:
      - app-net
      - data-net
      - telemetry-net
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      moto-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz 2>/dev/null || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    mem_limit: 512m
    mem_reservation: 256m

  # ============================================================================
  # App — usecase-app (domain / business logic layer)
  # ============================================================================
  usecase-app:
    build:
      context: ${REPO_ROOT:-.}/poc/java-vertx-distributed
      dockerfile: usecase-app/Dockerfile
    image: naranjax/usecase-app:latest
    user: "1002:1002"
    environment:
      OTEL_SERVICE_NAME:               usecase-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      OTEL_INSTRUMENTATION_VERTX_ENABLED: "true"
      HAZELCAST_MEMBERS:               controller-app:5701,usecase-app:5701,repository-app:5701
      KAFKA_BOOTSTRAP_SERVERS:         redpanda:9092
      AWS_ENDPOINT_URL_S3:             http://minio:9000
      AWS_ENDPOINT_URL_SQS:            http://elasticmq:9324
      AWS_ACCESS_KEY_ID:               test
      AWS_SECRET_ACCESS_KEY:           test
      AWS_REGION:                      us-east-1
      RISK_AUDIT_BUCKET:               risk-audit
      RISK_SQS_QUEUE:                  risk-decisions-queue
      RULES_CONFIG_PATH:               /etc/naranjax/rules/rules.yaml
      BARRIER_MODE:                    blocking
      JAVA_TOOL_OPTIONS:               "-Xms128m -Xmx512m"
    volumes:
      - ${REPO_ROOT:-.}/examples/rules-config/v1/rules.yaml:/etc/naranjax/rules/rules.yaml:ro
    ports:
      - "6302:6300"
    networks:
      - app-net
      - data-net
      - telemetry-net
    depends_on:
      repository-app:
        condition: service_started
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz 2>/dev/null || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    mem_limit: 768m
    mem_reservation: 384m

  # ============================================================================
  # App — controller-app (HTTP ingress layer)
  # ============================================================================
  controller-app:
    build:
      context: ${REPO_ROOT:-.}/poc/java-vertx-distributed
      dockerfile: controller-app/Dockerfile
    image: naranjax/controller-app:latest
    user: "1001:1001"
    environment:
      OTEL_SERVICE_NAME:               controller-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      OTEL_INSTRUMENTATION_VERTX_ENABLED: "true"
      HAZELCAST_MEMBERS:               controller-app:5701,usecase-app:5701,repository-app:5701
      RULES_CONFIG_PATH:               /etc/naranjax/rules/rules.yaml
      ADMIN_TOKEN:                     admin-secret
      BARRIER_MODE:                    blocking
      JAVA_TOOL_OPTIONS:               "-Xms128m -Xmx512m"
    volumes:
      - ${REPO_ROOT:-.}/examples/rules-config/v1/rules.yaml:/etc/naranjax/rules/rules.yaml:ro
    ports:
      - "8080:8080"
      - "6301:6300"
    networks:
      - app-net
      - telemetry-net
    depends_on:
      usecase-app:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    mem_limit: 768m
    mem_reservation: 384m

  # ============================================================================
  # App — consumer-app (Kafka downstream consumer for audit/analytics)
  # ============================================================================
  consumer-app:
    build:
      context: ${REPO_ROOT:-.}/poc/java-vertx-distributed
      dockerfile: consumer-app/Dockerfile
    image: naranjax/consumer-app:latest
    user: "1004:1004"
    environment:
      OTEL_SERVICE_NAME:               consumer-app
      OTEL_EXPORTER_OTLP_ENDPOINT:     http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL:     http/protobuf
      OTEL_TRACES_EXPORTER:            otlp
      OTEL_METRICS_EXPORTER:           otlp
      OTEL_LOGS_EXPORTER:              otlp
      KAFKA_BOOTSTRAP_SERVERS:         redpanda:9092
      AWS_ENDPOINT_URL_S3:             http://minio:9000
      AWS_ACCESS_KEY_ID:               test
      AWS_SECRET_ACCESS_KEY:           test
      AWS_REGION:                      us-east-1
      RISK_AUDIT_BUCKET:               risk-audit
      JAVA_TOOL_OPTIONS:               "-Xms64m -Xmx256m"
    ports:
      - "6304:6300"
    networks:
      - app-net
      - data-net
      - telemetry-net
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    mem_limit: 384m
    mem_reservation: 192m

networks:
  app-net: {}
  data-net: {}
  telemetry-net: {}
