##############################################################################
# Shared infrastructure stack
#
# Network topology — 3 networks (collapsed from 5 for Hazelcast cluster connectivity):
#
#   app-net       : the Java app pods + Hazelcast TCP cluster.
#   data-net      : data services (Postgres, Valkey, Tansu, Floci AWS emulator)
#                   + apps that consume them.
#   telemetry-net : OTel collector + OpenObserve + all apps that emit telemetry.
#
# This file contains ONLY shared infrastructure — no application services.
# Each PoC adds its apps via an override file:
#
#   docker compose -f compose/docker-compose.yml \
#                  -f poc/vertx-layer-as-pod-eventbus/compose.override.yml up -d
#
# See compose/README.md for full usage.
##############################################################################

services:

  # ============================================================================
  # Infrastructure — Postgres 16
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       riskplatform
      POSTGRES_USER:     riskplatform
      # Must match POC_DB_PASSWORD seeded into Floci Secrets Manager so the
      # monolith (which reads riskplatform/db-password from Floci) can auth.
      POSTGRES_PASSWORD: ${POC_DB_PASSWORD:-change-me-db-password}
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskplatform -d riskplatform"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg-data:/var/lib/postgresql/data
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.50"

  # ============================================================================
  # Infrastructure — Valkey 8 (Redis-compatible cache, idempotency store)
  # ============================================================================
  valkey:
    image: valkey/valkey:8-alpine
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 96m
    mem_reservation: 32m
    cpus: "0.25"

  # ============================================================================
  # Infrastructure — Tansu (Kafka-wire-compatible broker, S3-backed via Floci)
  # ADR-0043: replaces Redpanda. Tansu is Rust/Apache-2.0, stores log segments
  # in the `tansu` S3 bucket (seeded by floci-init). Image is distroless-ish
  # (no curl/nc/sh), so we cannot run a CMD-based healthcheck — readiness is
  # implicit via the :9092 listener binding. tansu-init (below) acts as the
  # external readiness gate by creating topics through the wire protocol.
  # Env vars verbatim from upstream example.env.
  # ============================================================================
  tansu:
    image: ghcr.io/tansu-io/tansu:0.6.0
    environment:
      CLUSTER_ID:              "tansu"
      ADVERTISED_LISTENER_URL: "tcp://tansu:9092"
      STORAGE_ENGINE:          "s3://tansu/"
      AWS_ACCESS_KEY_ID:       "test"
      AWS_SECRET_ACCESS_KEY:   "test"
      AWS_DEFAULT_REGION:      "us-east-1"
      AWS_ENDPOINT:            "http://floci:4566"
      AWS_ALLOW_HTTP:          "true"
      RUST_LOG:                "warn,tansu_broker=info,tansu_storage=info"
    networks:
      - data-net
    ports:
      - "9092:9092"
    depends_on:
      floci:
        condition: service_healthy
      floci-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["NONE"]
    mem_limit: 256m
    mem_reservation: 96m
    cpus: "0.50"

  # Topic seeding via Apache Kafka client (works against Tansu wire protocol).
  # librdkafka 2.x clients (kcat 1.7.1) hit incompatibilities at handshake;
  # confluentinc/cp-kafka ships the JVM Apache Kafka client which works.
  # Idempotent: --if-not-exists swallows AlreadyExistsException.
  tansu-init:
    image: confluentinc/cp-kafka:7.0.0
    depends_on:
      tansu:
        condition: service_started
    networks:
      - data-net
    entrypoint: /bin/bash
    command:
      - -ec
      - |
        BROKER="tansu:9092"
        # Tansu has no CMD-based healthcheck; poll metadata before topic creation.
        # Apache Kafka client tolerates Tansu's wire protocol; retry until ready.
        for i in $$(seq 1 30); do
          if kafka-broker-api-versions --bootstrap-server "$$BROKER" >/dev/null 2>&1; then
            echo "tansu :9092 ready after $$i attempt(s)"
            break
          fi
          [ "$$i" = "30" ] && { echo "FATAL: tansu :9092 unreachable" >&2; exit 2; }
          sleep 2
        done
        kafka-topics --bootstrap-server "$$BROKER" --create --if-not-exists \
            --topic risk-decisions     --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server "$$BROKER" --create --if-not-exists \
            --topic risk-decisions-dlq --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server "$$BROKER" --create --if-not-exists \
            --topic risk-audit         --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server "$$BROKER" --list
        echo "Tansu topics ready."
    restart: "no"

  # ============================================================================
  # Observability — OpenTelemetry Collector
  # ============================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.141.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      # Local demo credentials from openobserve below:
      # admin@example.com / change-me-openobserve-local → base64(user:password).
      # A placeholder here caused OpenObserve 401s, OTel exporter retries/timeouts,
      # and hidden CPU/log saturation during bring-up.
      OPENOBSERVE_BASIC_AUTH_HEADER: ${OPENOBSERVE_BASIC_AUTH_HEADER:-Basic YWRtaW5AZXhhbXBsZS5jb206Y2hhbmdlLW1lLW9wZW5vYnNlcnZlLWxvY2Fs}
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - telemetry-net
    depends_on:
      openobserve:
        condition: service_started
    mem_limit: 192m
    mem_reservation: 96m
    cpus: "0.50"

  # ============================================================================
  # Observability — OpenObserve (unified traces + logs + metrics)
  # ============================================================================
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    environment:
      ZO_ROOT_USER_EMAIL:    ${OPENOBSERVE_USER:-admin@example.com}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_PASSWORD:-change-me-openobserve-local}
      ZO_DATA_DIR:           /data
    # Keep OpenObserve ephemeral in the local compose stack. Persisting /data
    # keeps the first boot's admin password forever; later password/default
    # changes make the OTel collector receive 401s, then retry/log-loop and
    # saturate the laptop during bring-up.
    ports:
      - "5080:5080"
    networks:
      - telemetry-net
    # Distroless image: no shell, wget, curl, or nc available, so any CMD-based
    # healthcheck fails with "executable file not found in $PATH". Disable the
    # Docker healthcheck — readiness is implicit via successful HTTP boot
    # (log line "Starting HTTP server at: 0.0.0.0:5080"). Dependents that need
    # a real wait should probe http://openobserve:5080/healthz from their side
    # (the endpoint itself works fine; only the in-container probe is broken).
    healthcheck:
      test: ["NONE"]
    mem_limit: 384m
    mem_reservation: 192m
    cpus: "0.50"

  # ============================================================================
  # AWS Mocks — Floci unified AWS emulator (S3 + SQS + SNS + Secrets + KMS + STS + IAM)
  # ADR-0042: replaces the prior MinIO + ElasticMQ + Moto + OpenBao stack.
  # Image: floci/floci:latest (GraalVM native, MIT, ~40 MB, ~24 ms startup).
  # Endpoint: http://floci:4566 (single port for ALL AWS services).
  # Health: GET /_floci/health on 4566.
  # ============================================================================

  floci:
    image: floci/floci:latest
    networks:
      - data-net
    ports:
      - "4566:4566"
    environment:
      # Returned URLs (e.g. SQS QueueUrl) must use the docker service hostname,
      # not localhost, so other containers can reach them.
      FLOCI_HOSTNAME:       floci
      FLOCI_BASE_URL:       http://floci:4566
      FLOCI_DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_floci/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.50"

  # Floci seeding — single init job that creates ALL AWS resources via aws CLI.
  # Idempotent (every create swallows "already exists" errors). Verifies the
  # resources are listable after creation; fails loudly on missing.
  floci-init:
    image: amazon/aws-cli:latest
    networks:
      - data-net
    depends_on:
      floci:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID:     test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION:    us-east-1
      FLOCI_ENDPOINT:        http://floci:4566
      POC_DB_PASSWORD:       ${POC_DB_PASSWORD:-change-me-db-password}
      POC_API_KEY:           ${POC_API_KEY:-change-me-api-key}
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        EP="$$FLOCI_ENDPOINT"
        echo "=== Seeding Floci at $$EP ==="

        # ─── S3 buckets ──────────────────────────────────────────────────────
        # Note: "tansu" is the storage bucket for the poc/kafka-s3-tansu
        # exploration (Tansu broker uses STORAGE_ENGINE="s3://tansu/").
        # Idempotent — head-bucket short-circuits when it already exists.
        for b in risk-events risk-models risk-audit tansu; do
          if aws --endpoint-url=$$EP s3api head-bucket --bucket "$$b" >/dev/null 2>&1; then
            echo "  s3 exists:   $$b"
          else
            aws --endpoint-url=$$EP s3 mb "s3://$$b" >/dev/null
            echo "  s3 created:  $$b"
          fi
        done

        # ─── SQS queues (DLQ first; main queues; audit) ──────────────────────
        QUEUES="risk-decisions-dlq risk-decisions risk-decisions-queue risk-audit-queue"
        for q in $$QUEUES; do
          if aws --endpoint-url=$$EP sqs get-queue-url --queue-name "$$q" >/dev/null 2>&1; then
            echo "  sqs exists:  $$q"
          else
            aws --endpoint-url=$$EP sqs create-queue --queue-name "$$q" >/dev/null
            echo "  sqs created: $$q"
          fi
        done

        # ─── SNS topic ────────────────────────────────────────────────────────
        aws --endpoint-url=$$EP sns create-topic --name risk-events >/dev/null 2>&1 || true
        echo "  sns ready:   risk-events"

        # ─── Secrets Manager ──────────────────────────────────────────────────
        seed_secret() {
          NAME="$$1"; VAL="$$2"
          if aws --endpoint-url=$$EP secretsmanager describe-secret --secret-id "$$NAME" >/dev/null 2>&1; then
            echo "  sec exists:  $$NAME"
          else
            aws --endpoint-url=$$EP secretsmanager create-secret \
              --name "$$NAME" --secret-string "$$VAL" >/dev/null
            echo "  sec created: $$NAME"
          fi
        }
        seed_secret riskplatform/db-password "$$POC_DB_PASSWORD"
        seed_secret risk-engine/db-password  "$$POC_DB_PASSWORD"
        seed_secret risk-engine/api-key      "$$POC_API_KEY"

        # ─── Verify (loudly) ──────────────────────────────────────────────────
        for b in risk-events risk-models risk-audit tansu; do
          aws --endpoint-url=$$EP s3api head-bucket --bucket "$$b" >/dev/null \
            || { echo "FATAL: s3 bucket missing post-create: $$b" >&2; exit 2; }
        done
        for q in risk-decisions-dlq risk-decisions risk-decisions-queue risk-audit-queue; do
          aws --endpoint-url=$$EP sqs get-queue-url --queue-name "$$q" >/dev/null \
            || { echo "FATAL: sqs queue missing post-create: $$q" >&2; exit 2; }
        done
        for s in riskplatform/db-password risk-engine/db-password risk-engine/api-key; do
          aws --endpoint-url=$$EP secretsmanager describe-secret --secret-id "$$s" >/dev/null \
            || { echo "FATAL: secret missing post-create: $$s" >&2; exit 2; }
        done
        echo "=== Floci seeded and verified ==="
    restart: "no"

  # Postgres schema seeding (idempotent). Creates customer_features pre-app-startup
  # so any app reading from the DB before its own DbBootstrap completes does not
  # fail. Uses CREATE TABLE IF NOT EXISTS — coexists with app-side migrations.
  postgres-init:
    image: postgres:16-alpine
    networks:
      - data-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST:     postgres
      PGPORT:     "5432"
      PGUSER:     riskplatform
      PGPASSWORD: riskplatform
      PGDATABASE: riskplatform
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 <<'SQL'
        CREATE TABLE IF NOT EXISTS customer_features (
            customer_id          VARCHAR(64)       PRIMARY KEY,
            risk_score           DOUBLE PRECISION  NOT NULL,
            country              VARCHAR(8)        NOT NULL,
            customer_age_days    INTEGER           NOT NULL DEFAULT 365,
            chargeback_count_90d INTEGER           NOT NULL DEFAULT 0,
            known_device         BOOLEAN           NOT NULL DEFAULT TRUE
        );
        ALTER TABLE customer_features
          ADD COLUMN IF NOT EXISTS customer_age_days    INTEGER NOT NULL DEFAULT 365,
          ADD COLUMN IF NOT EXISTS chargeback_count_90d INTEGER NOT NULL DEFAULT 0,
          ADD COLUMN IF NOT EXISTS known_device         BOOLEAN NOT NULL DEFAULT TRUE;
        SQL
        # Verify table exists.
        psql -v ON_ERROR_STOP=1 -tAc "SELECT to_regclass('public.customer_features');" \
          | grep -q customer_features \
          || { echo "FATAL: customer_features missing post-create" >&2; exit 2; }
        echo "Postgres schema seeded and verified."
    restart: "no"

networks:
  app-net:
    driver: bridge
  data-net:
    driver: bridge
  telemetry-net:
    driver: bridge

volumes:
  pg-data:
  openobserve-data:
