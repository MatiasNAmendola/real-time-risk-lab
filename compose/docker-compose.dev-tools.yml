##############################################################################
# Dev tools override — optional UI tooling for local development.
#
# Usage:
#   docker compose -f compose/docker-compose.yml \
#                  -f compose/docker-compose.dev-tools.yml up -d
#
# NOTE (2026-05-11, ADR-0043): The Redpanda Console tile was removed when the
# broker was swapped to Tansu. Tansu has no bundled console UI; for Kafka topic
# inspection use the Apache Kafka CLI inside the `tansu-init` image:
#
#   docker run --rm --network compose_data-net confluentinc/cp-kafka:7.0.0 \
#       kafka-topics --bootstrap-server tansu:9092 --list
#
# Reintroduce a console here only if a Tansu-compatible UI lands upstream.
##############################################################################

services: {}
