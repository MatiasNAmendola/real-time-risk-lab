apiVersion: v1
kind: Namespace
metadata:
  name: homer

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
data:
  config.yml: |
    title: "Real-Time Risk Lab — Local Dashboard (k8s)"
    subtitle: "Local risk lab cluster services"
    logo: "assets/logo.svg"
    header: true
    footer: '<p>Cluster dashboard. Updated 2026-05-07.</p>'

    defaults:
      layout: columns
      colorTheme: dark

    services:
      - name: "Apps"
        icon: "fas fa-rocket"
        items:
          - name: "Risk Engine — Vertx (k8s)"
            subtitle: "Vertx layer-as-pod via Helm chart. NOT the bare-javac (which runs locally only)."
            tag: "java"
            url: "http://risk-engine.risk-engine.svc.cluster.local:8080"
            target: "_blank"

          - name: "Risk Engine — Health (k8s)"
            subtitle: "Liveness + readiness"
            url: "http://risk-engine.risk-engine.svc.cluster.local:8080/healthz"
            target: "_blank"

      - name: "API Documentation"
        icon: "fas fa-book"
        items:
          - name: "OpenAPI Spec (Vertx)"
            subtitle: "REST contract"
            url: "http://risk-engine.risk-engine.svc.cluster.local:8080/openapi.json"
            target: "_blank"

          - name: "Swagger UI (Vertx)"
            subtitle: "Interactive REST docs"
            url: "http://risk-engine.risk-engine.svc.cluster.local:8080/docs"
            target: "_blank"

          - name: "AsyncAPI Spec (Vertx)"
            subtitle: "Kafka + WS contracts"
            url: "http://risk-engine.risk-engine.svc.cluster.local:8080/asyncapi.json"
            target: "_blank"

      - name: "Observability"
        icon: "fas fa-chart-line"
        items:
          - name: "OpenObserve"
            subtitle: "Single source of truth: logs + metrics + traces + alerting. root@example.com / ${OPENOBSERVE_PASSWORD:-change-me-openobserve-local}"
            tag: "otel"
            url: "http://openobserve.openobserve.svc.cluster.local:5080"
            target: "_blank"

      - name: "Streaming"
        icon: "fas fa-stream"
        items:
          - name: "Tansu broker"
            subtitle: "Kafka wire :9092 (no bundled UI — use kafka-topics CLI). ADR-0043"
            tag: "kafka"
            url: "http://tansu.tansu.svc.cluster.local:9092"
            target: "_blank"

      - name: "AWS Mocks"
        icon: "fab fa-aws"
        items:
          - name: "Floci (unified AWS emulator)"
            subtitle: "S3 + SQS + SNS + Secrets + KMS + STS + IAM on a single endpoint (ADR-0042)"
            tag: "aws"
            url: "http://floci.aws-mocks.svc.cluster.local:4566"
            target: "_blank"

          - name: "Floci health"
            subtitle: "GET /_floci/health"
            url: "http://floci.aws-mocks.svc.cluster.local:4566/_floci/health"
            target: "_blank"

      - name: "ArgoCD"
        icon: "fas fa-sync"
        items:
          - name: "ArgoCD"
            subtitle: "GitOps deploys"
            tag: "k8s"
            url: "https://argocd-server.argocd.svc.cluster.local"
            target: "_blank"

          - name: "Argo Rollouts"
            subtitle: "Canary + analysis"
            url: "http://argo-rollouts-dashboard.argo-rollouts.svc.cluster.local:3100"
            target: "_blank"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: homer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer
  template:
    metadata:
      labels:
        app: homer
    spec:
      containers:
        - name: homer
          image: b4bz/homer:latest
          ports:
            - containerPort: 8080
          env:
            - name: INIT_ASSETS
              value: "0"
          volumeMounts:
            - name: config
              mountPath: /www/assets/config.yml
              subPath: config.yml
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: homer-config

---
apiVersion: v1
kind: Service
metadata:
  name: homer
  namespace: homer
spec:
  selector:
    app: homer
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homer
  namespace: homer
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: dashboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homer
                port:
                  number: 80
