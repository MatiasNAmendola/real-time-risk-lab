# test-groups.yaml — Test group definitions for scripts/test-runner.py
#
# Each atomic group maps to a single command with resource hints.
# Composites are ordered lists of group names.
#
# Taxonomy intent:
#   - `quick` is intentionally tiny and live-demo safe: no Gradle/JUnit.
#     It checks artifact freshness + source-level architecture boundaries.
#   - `ci-fast` is the first composite that runs real unit + ArchUnit tests.
#   - SDK unit tests are separate from Java platform unit tests.
#   - Compose/Testcontainers/k8s/k6 suites are explicit and never hidden behind unit.
#   - Compose-backed suites are exclusive unless they are known to share infra safely.
#
# Fields:
#   cmd              shell command to execute (run from REPO_ROOT)
#   needs_infra      false | compose | docker | k8s
#   cost_cpu         low | medium | high  (default: medium)
#   cost_ram_mb      estimated RAM consumption in MB  (default: 500)
#   duration_estimate_sec   rough expected wall-clock seconds  (default: 60)
#   exclusive        true = must run alone, no concurrent jobs  (default: false)
#   requires         flow-list of external CLI tools that MUST be in PATH for
#                    the group to run. Example: requires: [npm, node]. If any
#                    listed tool is missing, the runner SKIPs the group with a
#                    clear verdict instead of failing with exit 127.

groups:
  quick-check:
    # Sub-second live-demo guardrail. Does not invoke Gradle: use `./nx build`
    # before quick when artifacts are stale. Full JUnit/ArchUnit validation is
    # in `ci-fast`.
    cmd: "python3 .ai/scripts/quick-check.py"
    needs_infra: false
    cost_cpu: low
    cost_ram_mb: 100
    duration_estimate_sec: 2
    exclusive: false

  unit-java-fast:
    # Fast, no-infra Java unit slice. Do NOT use `./gradlew test` here:
    # that traverses every Gradle test task (architecture, integration, k8s,
    # ATDD placeholders, component tests) and makes `quick` slow/flaky.
    cmd: "./gradlew :pkg:errors:test :pkg:config:test :pkg:resilience:test :pkg:events:test :pkg:kafka:test :pkg:observability:test :pkg:repositories:test :pkg:integration-audit:test :pkg:testing:test :pkg:risk-domain:test :poc:no-vertx-clean-engine:test --parallel"
    needs_infra: false
    cost_cpu: medium
    cost_ram_mb: 800
    duration_estimate_sec: 60
    exclusive: false

  arch:
    # Must run in its own Gradle invocation level. Running this concurrently
    # with `unit` has reproduced a Gradle/JUnit XML report write race in
    # tests/architecture/build/test-results/test/TEST-*.xml.
    cmd: "./gradlew :tests:architecture:test"
    needs_infra: false
    cost_cpu: low
    cost_ram_mb: 400
    duration_estimate_sec: 15
    exclusive: true

  unit-sdk-java:
    cmd: "./gradlew :sdks:risk-client-java:test :sdks:risk-events:test --parallel"
    needs_infra: false
    cost_cpu: low
    cost_ram_mb: 700
    duration_estimate_sec: 30
    exclusive: false

  unit-sdk-typescript:
    cmd: "scripts/lib/with-fnm.sh sh -c 'cd sdks/risk-client-typescript && ([ -d node_modules ] || npm ci --silent) && npm test -- --runInBand'"
    needs_infra: false
    cost_cpu: low
    cost_ram_mb: 400
    duration_estimate_sec: 20
    exclusive: false
    requires: ["fnm|npm"]

  unit-sdk-go:
    cmd: "cd sdks/risk-client-go && go test ./..."
    needs_infra: false
    cost_cpu: low
    cost_ram_mb: 200
    duration_estimate_sec: 10
    exclusive: false
    requires: [go]

  atdd-cucumber:
    cmd: "./gradlew :tests:risk-engine-atdd:test"
    needs_infra: false
    cost_cpu: medium
    cost_ram_mb: 600
    duration_estimate_sec: 30
    exclusive: false

  component-vertx-layer-as-pod-http:
