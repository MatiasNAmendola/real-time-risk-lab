  # Backward-compatible aliases for existing docs/scripts.
  unit:
    cmd: "./gradlew :pkg:errors:test :pkg:config:test :pkg:resilience:test :pkg:events:test :pkg:kafka:test :pkg:observability:test :pkg:repositories:test :pkg:integration-audit:test :pkg:testing:test :pkg:risk-domain:test :poc:no-vertx-clean-engine:test --parallel"
